<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngao IU - v22 Pro + Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cat-tag { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #334155; white-space: nowrap; }
        .cat-tag.active { background: #ef4444; border-color: #ef4444; color: white; }
        input[type="range"] { accent-color: #ef4444; cursor: pointer; width: 100%; }
        .emotion-btn { padding: 6px; border-radius: 10px; font-size: 8px; font-weight: bold; text-transform: uppercase; border: 1px solid #334155; flex: 1; text-align: center; cursor: pointer; transition: 0.2s; color: #94a3b8; }
        .emotion-btn.active { background: #ef4444; border-color: #ef4444; color: white; }
        .action-btn { font-size: 10px; padding: 6px 10px; border-radius: 8px; background: #1e293b; color: #94a3b8; transition: 0.2s; }
        .action-btn:hover { background: #334155; color: white; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6 shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white shadow-lg shadow-red-600/20">N</div>
            <div class="space-y-2">
                <h2 class="text-xl font-black uppercase tracking-tighter">Ngao IU v22</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase">Hệ thống Livestream Automation</p>
            </div>
            <input type="text" id="user" placeholder="Tên tài khoản..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white text-center focus:border-red-600 transition-all">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg active:scale-95 transition-transform">Vào hệ thống</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white uppercase">AD</div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase italic text-red-500 tracking-widest">Admin</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openStudio()" class="bg-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase text-white">Studio</button>
            <button onclick="toggleSettings()" class="text-slate-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="hidden glass m-4 p-5 rounded-[2rem] space-y-4 border border-blue-500/30 shadow-xl shadow-blue-500/10">
        <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase">Link Google Studio Mini App</label>
            <input type="text" id="studioLinkInput" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-blue-400 outline-none">
        </div>
        <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase">Link API Giọng đọc ngoài (Tùy chọn)</label>
            <input type="text" id="externalVoiceApi" placeholder="https://api.example.com/tts?text=" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-white outline-none">
        </div>
        <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-[10px] uppercase">Lưu cấu hình</button>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-6">
        <div class="flex gap-2">
            <button onclick="exportFullData()" class="flex-1 bg-green-700/30 border border-green-600/50 p-3 rounded-2xl text-[9px] font-black text-green-400 uppercase"><i class="fas fa-download mr-1"></i> Xuất File</button>
            <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-blue-700/30 border border-blue-600/50 p-3 rounded-2xl text-[9px] font-black text-blue-400 uppercase"><i class="fas fa-upload mr-1"></i> Nhập File</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importFullData(event)">
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500 italic">Danh mục sản phẩm</span>
                <button onclick="addCategory()" class="text-blue-500"><i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="categoryTabs" class="flex overflow-x-auto gap-2 pb-2"></div>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white focus:border-blue-500 transition-all">
                <select id="newPCat" class="bg-slate-950 border border-slate-800 px-4 rounded-2xl text-[10px] text-white outline-none font-bold uppercase"></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('imgUpload').click()" class="bg-slate-800 border border-dashed border-slate-600 rounded-2xl p-3 text-[10px] font-bold text-slate-400 uppercase">
                    <span id="imgStatus">Tải ảnh</span>
                </button>
                <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this)">
                <button onclick="processImport()" class="bg-blue-600 rounded-2xl font-black text-[10px] uppercase text-white shadow-lg shadow-blue-600/20">Lưu kho</button>
            </div>
            <textarea id="newPJson" placeholder="Dán JSON hoặc kịch bản (mỗi dòng 1 câu)..." class="w-full h-24 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-[10px] outline-none text-white"></textarea>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="grid grid-cols-2 gap-2">
                <button id="modeOnline" onclick="setMode('online')" class="bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Online</button>
                <button id="modeOffline" onclick="setMode('offline')" class="bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white">Giọng Offline</button>
            </div>

            <div class="space-y-4 bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Âm lượng</span><span id="voiceVolVal">100%</span></div>
                        <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                </div>
                
                <div id="emotionConfig" class="space-y-1">
                    <label class="text-[8px] font-bold text-slate-600 uppercase block mb-1">Cảm xúc giọng đọc</label>
                    <div class="flex gap-1">
                        <div onclick="setEmotion('normal')" id="emo-normal" class="emotion-btn active">Bình thường</div>
                        <div onclick="setEmotion('happy')" id="emo-happy" class="emotion-btn">Vui vẻ</div>
                        <div onclick="setEmotion('sexy')" id="emo-sexy" class="emotion-btn">Gợi cảm</div>
                        <div onclick="setEmotion('fast')" id="emo-fast" class="emotion-btn">Gấp gáp</div>
                    </div>
                </div>

                <div id="voiceConfig" class="pt-2">
                    <label class="text-[8px] font-bold text-slate-600 uppercase mb-1 block">Giọng hệ thống (Offline)</label>
                    <select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-[10px] text-white outline-none"></select>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] text-center border-t-2 border-red-600/30">
            <div class="flex justify-between items-center mb-6 px-4">
                <span class="text-[10px] font-black text-slate-500 uppercase">Nghỉ giữa câu (giây)</span>
                <input type="number" id="interval" value="5" class="bg-transparent text-right font-black text-red-500 text-4xl outline-none w-16">
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl shadow-red-600/20 uppercase text-white">BẮT ĐẦU TREO LIVE</button>
        </div>

        <div class="flex justify-between items-center px-4">
             <h3 class="text-[10px] font-black text-slate-500 uppercase italic">Sản phẩm trong kho</h3>
             <div class="flex gap-2">
                <button onclick="bulkAction('select_all')" class="text-[8px] uppercase font-bold text-blue-500">Chọn hết</button>
                <button onclick="bulkAction('deselect_all')" class="text-[8px] uppercase font-bold text-slate-500">Bỏ chọn</button>
             </div>
        </div>
        <div id="productList" class="space-y-3 pb-20"></div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6">
        <div class="max-w-xl mx-auto glass p-6 rounded-[2rem] space-y-4 h-full flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <h3 id="editTitle" class="font-black text-sm uppercase text-red-500">SỬA KỊCH BẢN</h3>
                <button onclick="closeEdit()" class="text-white text-xl px-2">×</button>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3"></div>
            <button onclick="saveEdit()" class="w-full py-4 bg-green-600 rounded-2xl font-black uppercase text-white">HOÀN TẤT</button>
        </div>
    </div>

    <audio id="ttsCloud" crossOrigin="anonymous"></audio>

    <script>
        // DATA STATE
        let store = { categories: ["Thời trang", "Gia dụng"], products: [], studioLink: "", extVoice: "", emotion: 'normal' };
        let currentUser = "", currentMode = 'offline', tempImg = "", editIdx = null;
        let isLive = false, voices = [], currentFilter = "All";
        let scriptPointer = 0, productPointer = 0;

        const ttsCloud = document.getElementById('ttsCloud');
        
        // WORKER FOR BACKGROUND TIMER
        const workerBlob = new Blob([`
            let t=null;
            self.onmessage=function(e){
                if(e.data.action==='start'){
                    clearInterval(t);
                    t=setInterval(()=>{self.postMessage('tick')}, e.data.interval*1000);
                } else if(e.data.action==='stop'){
                    clearInterval(t);
                }
            }
        `], {type:'text/javascript'});
        const worker = new Worker(URL.createObjectURL(workerBlob));
        worker.onmessage = (e) => { if(isLive && e.data === 'tick') runNext(); };

        // 1. LOGIN & SYNC
        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return alert("Vui lòng nhập tên!");
            
            currentUser = user;
            const saved = localStorage.getItem('ngao_v22_final_' + user);
            if (saved) store = JSON.parse(saved);

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('welcomeUser').innerText = user;
            document.getElementById('userAvatar').innerText = user.substring(0,2).toUpperCase();
            
            document.getElementById('studioLinkInput').value = store.studioLink || "";
            document.getElementById('externalVoiceApi').value = store.extVoice || "";
            
            sync();
            loadVoices();
        }

        function sync() {
            saveToLocal();
            renderCategories();
            renderList();
            updateUI();
        }

        function saveToLocal() { 
            if(currentUser) localStorage.setItem('ngao_v22_final_' + currentUser, JSON.stringify(store)); 
        }

        // 2. UI RENDERERS
        function renderCategories() {
            let html = `<div onclick="filterBy('All')" class="cat-tag ${currentFilter === 'All' ? 'active' : ''}">Tất cả</div>`;
            store.categories.forEach(cat => {
                html += `<div onclick="filterBy('${cat}')" class="cat-tag ${currentFilter === cat ? 'active' : ''}">${cat}</div>`;
            });
            document.getElementById('categoryTabs').innerHTML = html;
            document.getElementById('newPCat').innerHTML = store.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function renderList() {
            const list = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            document.getElementById('productList').innerHTML = list.length ? list.map((p, i) => `
                <div class="product-card p-4 glass ${p.active ? 'active' : 'opacity-50'} space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <img src="${p.img}" class="thumb border border-slate-700">
                            <div>
                                <h4 class="text-xs font-black uppercase text-white">${p.name}</h4>
                                <span class="text-[8px] text-slate-500 font-bold uppercase">${p.category} | ${p.scripts.length} câu</span>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="editProduct(${store.products.indexOf(p)})" class="action-btn"><i class="fas fa-edit"></i></button>
                            <button onclick="toggleActive(${store.products.indexOf(p)})" class="action-btn ${p.active ? 'text-red-500' : ''}"><i class="fas fa-power-off"></i></button>
                            <button onclick="deleteProduct(${store.products.indexOf(p)})" class="action-btn text-slate-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('') : `<div class="text-center py-10 text-slate-600 text-[10px] uppercase font-bold italic">Chưa có sản phẩm nào</div>`;
        }

        function updateUI() {
            document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value;
            document.getElementById('voiceVolVal').innerText = Math.round(document.getElementById('voiceVol').value * 100) + "%";
        }

        // 3. PRODUCT LOGIC
        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempImg = e.target.result;
                    document.getElementById('imgStatus').innerText = "Đã chọn ảnh";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function processImport() {
            const name = document.getElementById('newPName').value;
            const cat = document.getElementById('newPCat').value;
            let raw = document.getElementById('newPJson').value.trim();
            if(!name || !raw) return alert("Nhập tên và kịch bản!");

            let scripts = raw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
            store.products.push({ id: Date.now(), name, category: cat, img: tempImg || "https://placehold.co/50x50", active: true, scripts });
            
            tempImg = "";
            document.getElementById('newPName').value = "";
            document.getElementById('newPJson').value = "";
            document.getElementById('imgStatus').innerText = "Tải ảnh";
            sync();
        }

        function deleteProduct(idx) { if(confirm("Xóa sản phẩm này?")) { store.products.splice(idx, 1); sync(); } }
        function toggleActive(idx) { store.products[idx].active = !store.products[idx].active; sync(); }
        function filterBy(cat) { currentFilter = cat; renderCategories(); renderList(); }
        function addCategory() { const n = prompt("Tên danh mục mới:"); if(n) { store.categories.push(n); sync(); } }

        // 4. SETTINGS & VOICE
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveSettings() {
            store.studioLink = document.getElementById('studioLinkInput').value;
            store.extVoice = document.getElementById('externalVoiceApi').value;
            sync();
            alert("Đã lưu!");
            toggleSettings();
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('modeOnline').className = m === 'online' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
            document.getElementById('modeOffline').className = m === 'offline' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
        }

        function setEmotion(emo) {
            store.emotion = emo;
            document.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('emo-' + emo).classList.add('active');
            saveToLocal();
        }

        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi') || v.lang.includes('en'));
            document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.lang.startsWith('vi') ? '🇻🇳' : '🇺🇸'} ${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        // 5. AUTOMATION (TREO LIVE)
        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                const activeOnes = store.products.filter(p => p.active);
                if(!activeOnes.length) { isLive = false; return alert("Hãy bật ít nhất 1 sản phẩm!"); }
                btn.innerText = "ĐANG CHẠY... (BẤM DỪNG)";
                btn.classList.replace('bg-red-600', 'bg-slate-700');
                worker.postMessage({action: 'start', interval: document.getElementById('interval').value});
                runNext(); // Chạy ngay lập tức câu đầu
            } else {
                btn.innerText = "TREO LIVE";
                btn.classList.replace('bg-slate-700', 'bg-red-600');
                worker.postMessage({action: 'stop'});
                window.speechSynthesis.cancel();
            }
        }

        function runNext() {
            const activeProducts = store.products.filter(p => p.active);
            if(!activeProducts.length) return;

            if(productPointer >= activeProducts.length) productPointer = 0;
            const p = activeProducts[productPointer];
            
            if(scriptPointer >= p.scripts.length) {
                scriptPointer = 0;
                productPointer++;
                runNext();
                return;
            }

            const text = p.scripts[scriptPointer];
            speak(text);
            scriptPointer++;
        }

        function speak(text) {
            if(currentMode === 'offline') {
                const msg = new SpeechSynthesisUtterance(text);
                const vIdx = document.getElementById('voiceSelect').value;
                if(voices[vIdx]) msg.voice = voices[vIdx];
                msg.rate = document.getElementById('voiceRate').value;
                msg.volume = document.getElementById('voiceVol').value;
                window.speechSynthesis.speak(msg);
            } else {
                const api = store.extVoice || "https://translate.google.com/translate_tts?ie=UTF-8&tl=vi-VN&client=tw-ob&q=";
                ttsCloud.src = api.includes('google') ? api + encodeURIComponent(text) : api.replace('{text}', encodeURIComponent(text));
                ttsCloud.play().catch(e => console.log("Audio Play Error"));
            }
        }

        // 6. EDIT MODAL LOGIC
        function editProduct(idx) {
            editIdx = idx;
            const p = store.products[idx];
            document.getElementById('editTitle').innerText = "SỬA: " + p.name;
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s, i) => `
                <div class="flex gap-2">
                    <input type="text" value="${s}" class="flex-1 bg-slate-900 border border-slate-800 p-3 rounded-xl text-[10px] text-white outline-none">
                    <button onclick="this.parentElement.remove()" class="text-red-500 p-2"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function saveEdit() {
            const inputs = document.getElementById('scriptItems').querySelectorAll('input');
            store.products[editIdx].scripts = Array.from(inputs).map(i => i.value);
            closeEdit();
            sync();
        }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }
        function openStudio() { if(!store.studioLink) return alert("Chưa có link Studio!"); window.open(store.studioLink, 'Studio', 'width=1000,height=800'); }
        
        function bulkAction(type) {
            store.products.forEach(p => p.active = (type === 'select_all'));
            sync();
        }

        function exportFullData() {
            const blob = new Blob([JSON.stringify(store)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `NgaoIU_${currentUser}.json`; a.click();
        }

        function importFullData(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    store = JSON.parse(ev.target.result);
                    sync();
                    alert("Thành công!");
                } catch(err) { alert("File lỗi!"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
