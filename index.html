<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngao IU - v22 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; cursor: pointer; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .mode-btn.active { background: #3b82f6; color: white; }
        .live-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        input[type="range"] { accent-color: #ef4444; cursor: pointer; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white">N</div>
            <h2 class="text-xl font-black uppercase">Ngao IU v22</h2>
            <input type="text" id="user" placeholder="Tên tài khoản..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg">Vào hệ thống</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white">AD</div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase">Admin</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openStudio()" class="bg-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase text-white">Studio</button>
            <button onclick="toggleSettings()" class="text-slate-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto p-4 space-y-6">

        <div class="glass p-5 rounded-[2rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white">
                <button onclick="document.getElementById('imgUpload').click()" class="bg-slate-800 border border-dashed border-slate-600 rounded-2xl text-[10px] font-bold">
                    <span id="imgStatus" class="text-slate-400">TẢI ẢNH</span>
                </button>
                <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this)">
            </div>
            <textarea id="newPJson" placeholder="Dán nội dung JSON kịch bản..." class="w-full h-24 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-[10px] outline-none text-white"></textarea>
            <button onclick="processImport()" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-[11px] uppercase text-white">Lưu vào kho hàng</button>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="grid grid-cols-2 gap-2">
                <button id="modeOnline" onclick="setMode('online')" class="mode-btn active p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Online</button>
                <button id="modeOffline" onclick="setMode('offline')" class="mode-btn p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Offline</button>
            </div>

            <div class="space-y-4 bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Cảm xúc</span><span id="pitchVal">1.0</span></div>
                        <input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black text-slate-400 uppercase"><span>Âm lượng giọng đọc</span><span id="voiceVolVal">100%</span></div>
                    <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1.0" oninput="updateUI()" class="w-full">
                </div>
            </div>

            <div id="offlineConfig" class="hidden"><select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-xs text-white outline-none"></select></div>

            <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="useMusic" class="w-4 h-4 accent-red-600">
                        <span class="text-[10px] font-black uppercase text-slate-400">Dùng nhạc nền</span>
                    </label>
                    <button onclick="document.getElementById('bgMusicInput').click()" class="text-[8px] bg-slate-800 px-3 py-1.5 rounded-lg text-white">CHỌN FILE</button>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Âm lượng nhạc</span><span id="volVal">20%</span></div>
                    <input type="range" id="musicVol" min="0" max="1" step="0.05" value="0.2" oninput="updateMusicVol()">
                </div>
                <input type="file" id="bgMusicInput" accept="audio/*" class="hidden" onchange="loadMusic(event)">
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] text-center shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-4">
                <span class="text-[10px] font-black text-slate-500 uppercase italic">Nghỉ giữa câu (giây)</span>
                <input type="number" id="interval" value="5" class="bg-transparent text-right font-black text-red-500 text-4xl outline-none w-16">
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest text-white">BẮT ĐẦU TREO LIVE</button>
        </div>

        <div id="productList" class="space-y-3 pb-20"></div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6">
        <div class="max-w-xl mx-auto glass p-6 rounded-[2rem] space-y-4 h-full flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <h3 id="editTitle" class="font-black text-sm uppercase text-red-500 tracking-wider">CHỈNH SỬA KỊCH BẢN</h3>
                <button onclick="closeEdit()" class="text-slate-500 text-xl p-2"><i class="fas fa-times"></i></button>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3 pr-2 py-2"></div>
            <button onclick="saveEdit()" class="w-full py-4 bg-green-600 rounded-2xl font-black uppercase text-white shadow-lg">LƯU THAY ĐỔI</button>
        </div>
    </div>

    <audio id="ttsCloud" crossOrigin="anonymous"></audio>
    <audio id="bgMusic" loop crossOrigin="anonymous"></audio>

    <script>
        let db = [], currentUser = "", currentMode = 'online', tempImg = "", editIdx = null;
        let isLive = false, voices = [];
        let miniLink = localStorage.getItem('ngao_iu_link') || "https://ai.studio/apps/ce2d7b0e-45a7-499f-9b6d-8e33db158288";

        const ttsCloud = document.getElementById('ttsCloud');
        const bgMusic = document.getElementById('bgMusic');

        // Worker chạy ngầm để không bị ngắt khi tắt màn hình
        const workerBlob = new Blob([`let t=null;self.onmessage=function(e){if(e.data.action==='start'){clearInterval(t);t=setInterval(()=>{self.postMessage('tick')},e.data.interval*1000)}else if(e.data.action==='stop'){clearInterval(t)}}`], {type:'text/javascript'});
        const worker = new Worker(URL.createObjectURL(workerBlob));
        worker.onmessage = (e) => { if(isLive && e.data === 'tick') runNext(); };

        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return;
            currentUser = user;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('welcomeUser').innerText = user;
            db = JSON.parse(localStorage.getItem('db_v22_' + user)) || [];
            renderList(); loadVoices();
        }

        function updateUI() {
            document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value;
            document.getElementById('pitchVal').innerText = document.getElementById('voicePitch').value;
            const vVol = document.getElementById('voiceVol').value;
            document.getElementById('voiceVolVal').innerText = Math.round(vVol * 100) + "%";
            ttsCloud.volume = vVol;
        }

        function updateMusicVol() {
            const vol = document.getElementById('musicVol').value;
            bgMusic.volume = vol;
            document.getElementById('volVal').innerText = Math.round(vol * 100) + "%";
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeOnline').classList.toggle('active', mode === 'online');
            document.getElementById('modeOffline').classList.toggle('active', mode === 'offline');
            document.getElementById('offlineConfig').classList.toggle('hidden', mode === 'online');
        }

        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi'));
            document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text, callback) {
            const cleanText = text.replace(/giá/gi, "cành").replace(/000/g, " ngàn");
            const rate = document.getElementById('voiceRate').value;
            const vVol = document.getElementById('voiceVol').value;
            const useMusic = document.getElementById('useMusic').checked;

            if (useMusic) bgMusic.volume = 0.05; // Giảm nhạc khi đọc

            if (currentMode === 'online') {
                ttsCloud.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=vi&client=tw-ob&ttsspeed=${rate}`;
                ttsCloud.volume = vVol;
                ttsCloud.play().catch(callback);
                ttsCloud.onended = () => { if(useMusic) bgMusic.volume = document.getElementById('musicVol').value; callback(); };
            } else {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(cleanText);
                msg.voice = voices[document.getElementById('voiceSelect').value];
                msg.rate = rate; msg.volume = vVol;
                msg.onend = () => { if(useMusic) bgMusic.volume = document.getElementById('musicVol').value; callback(); };
                window.speechSynthesis.speak(msg);
            }
        }

        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                btn.innerText = 'DỪNG TREO'; btn.classList.replace('bg-red-600', 'bg-slate-800');
                if (document.getElementById('useMusic').checked && bgMusic.src) bgMusic.play();
                worker.postMessage({ action: 'start', interval: document.getElementById('interval').value });
                runNext();
            } else {
                btn.innerText = 'BẮT ĐẦU TREO LIVE'; btn.classList.replace('bg-slate-800', 'bg-red-600');
                bgMusic.pause(); ttsCloud.pause(); window.speechSynthesis.cancel();
                worker.postMessage({ action: 'stop' });
            }
        }

        let isSpeaking = false;
        function runNext() {
            if (!isLive || isSpeaking) return;
            const active = db.filter(p => p.active);
            if (active.length > 0) {
                isSpeaking = true;
                const p = active[Math.floor(Math.random() * active.length)];
                const s = p.scripts[Math.floor(Math.random() * p.scripts.length)];
                speak(s, () => { isSpeaking = false; });
            }
        }

        // --- HÀM TEST THỬ (REVIEW) ---
        function testLine(btn, text) {
            const icon = btn.querySelector('i');
            icon.classList.replace('fa-play', 'fa-spinner'); icon.classList.add('fa-spin');
            speak(text, () => {
                icon.classList.replace('fa-spinner', 'fa-play'); icon.classList.remove('fa-spin');
            });
        }

        // --- QUẢN LÝ ---
        function processImport() {
            const name = document.getElementById('newPName').value;
            let raw = document.getElementById('newPJson').value.trim();
            if(!name || !raw) return alert("Thiếu tên hoặc kịch bản!");
            try {
                if(!raw.startsWith('[')) raw = '[' + raw + ']';
                const scripts = JSON.parse(raw).map(i => i.script || i.content || i.mo_ta || (typeof i === 'string' ? i : "")).filter(s => s);
                db.push({ id: Date.now(), name, img: tempImg || "https://placehold.co/50x50", active: true, scripts });
                sync();
                document.getElementById('newPName').value = ""; document.getElementById('newPJson').value = "";
                document.getElementById('imgStatus').innerText = "TẢI ẢNH"; tempImg = "";
            } catch(e) { alert("JSON lỗi!"); }
        }

        function openEdit(idx) {
            editIdx = idx;
            const p = db[idx];
            document.getElementById('editTitle').innerText = p.name;
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s, i) => `
                <div class="flex gap-2 bg-slate-900 p-3 rounded-2xl border border-slate-800 items-start">
                    <textarea class="flex-1 bg-transparent text-[11px] outline-none h-20 text-white">${s}</textarea>
                    <div class="flex flex-col gap-2">
                        <button onclick="testLine(this, this.parentElement.parentElement.querySelector('textarea').value)" class="bg-blue-600 w-8 h-8 rounded-lg text-[10px] text-white"><i class="fas fa-play"></i></button>
                        <button onclick="removeLine(${i})" class="bg-red-900/50 w-8 h-8 rounded-lg text-[10px] text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function removeLine(i) {
            const items = document.querySelectorAll('#scriptItems > div');
            items[i].remove();
        }

        function saveEdit() {
            const texts = Array.from(document.querySelectorAll('#scriptItems textarea')).map(t => t.value);
            db[editIdx].scripts = texts;
            sync(); closeEdit();
        }

        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

        function renderList() {
            document.getElementById('productList').innerHTML = db.map((p, i) => `
                <div class="product-card p-4 flex items-center justify-between glass ${p.active ? 'active' : ''}">
                    <div class="flex items-center gap-3 flex-1" onclick="openEdit(${i})">
                        <img src="${p.img}" class="thumb border border-slate-700">
                        <div class="text-left">
                            <div class="font-black text-[11px] ${p.active ? 'text-red-500' : 'text-slate-500'} uppercase">${p.name}</div>
                            <div class="text-[8px] text-slate-500 font-bold">${p.scripts.length} CÂU KỊCH BẢN</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive(${i})" class="w-6 h-6 accent-red-600">
                        <button onclick="deleteProduct(${i})" class="text-slate-700 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { tempImg = e.target.result; document.getElementById('imgStatus').innerText = "ĐÃ CÓ ẢNH"; };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function sync() { localStorage.setItem('db_v22_' + currentUser, JSON.stringify(db)); renderList(); }
        function toggleActive(i) { db[i].active = !db[i].active; sync(); }
        function deleteProduct(i) { if(confirm('Xóa sản phẩm này?')) { db.splice(i, 1); sync(); } }
        function toggleSettings() { document.getElementById('settingsPanel')?.classList.toggle('hidden'); }
        function openStudio() { window.open(miniLink, 'Studio', 'width=900,height=700'); }
        function loadMusic(e) { if (e.target.files[0]) bgMusic.src = URL.createObjectURL(e.target.files[0]); }
    </script>
</body>
</html>
