<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngao IU - v22 Offline Pro + Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cat-tag { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #334155; }
        .cat-tag.active { background: #ef4444; border-color: #ef4444; color: white; }
        input[type="range"] { accent-color: #ef4444; cursor: pointer; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white">N</div>
            <h2 class="text-xl font-black uppercase">Ngao IU v22</h2>
            <input type="text" id="user" placeholder="Tên tài khoản..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white text-center">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg">Vào hệ thống</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white">AD</div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase">Admin</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openStudio()" class="bg-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase text-white">Studio</button>
            <button onclick="toggleSettings()" class="text-slate-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="hidden glass m-4 p-5 rounded-[2rem] space-y-4 border border-blue-500/30">
        <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase">Link Google Studio Mini App</label>
            <input type="text" id="studioLinkInput" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-blue-400 outline-none">
        </div>
        <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase">Link API Giọng đọc ngoài (Tùy chọn)</label>
            <input type="text" id="externalVoiceApi" placeholder="https://api.example.com/tts?text=" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-white outline-none">
        </div>
        <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-[10px] uppercase">Lưu cấu hình</button>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-6">
        <div class="flex gap-2">
            <button onclick="exportFullData()" class="flex-1 bg-green-700/30 border border-green-600/50 p-3 rounded-2xl text-[9px] font-black text-green-400 uppercase"><i class="fas fa-download mr-1"></i> Xuất File Offline</button>
            <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-blue-700/30 border border-blue-600/50 p-3 rounded-2xl text-[9px] font-black text-blue-400 uppercase"><i class="fas fa-upload mr-1"></i> Nhập File Offline</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importFullData(event)">
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500 italic">Danh mục sản phẩm</span>
                <button onclick="addCategory()" class="text-blue-500"><i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="categoryTabs" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white">
                <select id="newPCat" class="bg-slate-950 border border-slate-800 px-4 rounded-2xl text-[10px] text-white outline-none font-bold uppercase"></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('imgUpload').click()" class="bg-slate-800 border border-dashed border-slate-600 rounded-2xl p-3 text-[10px] font-bold text-slate-400 uppercase">
                    <span id="imgStatus">Tải ảnh</span>
                </button>
                <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this)">
                <button onclick="processImport()" class="bg-blue-600 rounded-2xl font-black text-[10px] uppercase text-white">Lưu kho</button>
            </div>
            <textarea id="newPJson" placeholder="Dán JSON kịch bản..." class="w-full h-24 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-[10px] outline-none text-white"></textarea>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="grid grid-cols-2 gap-2">
                <button id="modeOnline" onclick="setMode('online')" class="bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Online</button>
                <button id="modeOffline" onclick="setMode('offline')" class="bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white">Giọng Offline</button>
            </div>

            <div class="space-y-4 bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Âm lượng</span><span id="voiceVolVal">100%</span></div>
                        <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                </div>
                <div id="voiceConfig" class="pt-2">
                    <label class="text-[8px] font-bold text-slate-600 uppercase mb-1 block">Chọn giọng đọc hệ thống (Việt/Anh)</label>
                    <select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-[10px] text-white outline-none"></select>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] text-center">
            <div class="flex justify-between items-center mb-6 px-4">
                <span class="text-[10px] font-black text-slate-500 uppercase">Nghỉ giữa câu (s)</span>
                <input type="number" id="interval" value="5" class="bg-transparent text-right font-black text-red-500 text-4xl outline-none w-16">
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl uppercase text-white">TREO LIVE</button>
        </div>

        <div id="productList" class="space-y-3 pb-20"></div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6">
        <div class="max-w-xl mx-auto glass p-6 rounded-[2rem] space-y-4 h-full flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <h3 id="editTitle" class="font-black text-sm uppercase text-red-500">SỬA KỊCH BẢN</h3>
                <button onclick="closeEdit()" class="text-white text-xl">×</button>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3"></div>
            <button onclick="saveEdit()" class="w-full py-4 bg-green-600 rounded-2xl font-black uppercase">HOÀN TẤT</button>
        </div>
    </div>

    <audio id="ttsCloud" crossOrigin="anonymous"></audio>

    <script>
        let store = { categories: ["Thời trang", "Gia dụng"], products: [], studioLink: "https://ai.studio/apps/ce2d7b0e-45a7-499f-9b6d-8e33db158288", extVoice: "" };
        let currentUser = "", currentMode = 'offline', tempImg = "", editIdx = null;
        let isLive = false, voices = [], currentFilter = "All";

        const ttsCloud = document.getElementById('ttsCloud');
        const workerBlob = new Blob([`let t=null;self.onmessage=function(e){if(e.data.action==='start'){clearInterval(t);t=setInterval(()=>{self.postMessage('tick')},e.data.interval*1000)}else if(e.data.action==='stop'){clearInterval(t)}}`], {type:'text/javascript'});
        const worker = new Worker(URL.createObjectURL(workerBlob));
        worker.onmessage = (e) => { if(isLive && e.data === 'tick') runNext(); };

        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return;
            currentUser = user;
            document.getElementById('loginScreen').classList.add('hidden');
            const saved = localStorage.getItem('ngao_v22_final_' + user);
            if (saved) store = JSON.parse(saved);
            
            document.getElementById('studioLinkInput').value = store.studioLink || "";
            document.getElementById('externalVoiceApi').value = store.extVoice || "";
            
            sync();
            loadVoices();
        }

        // --- STUDIO & SETTINGS ---
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveSettings() {
            store.studioLink = document.getElementById('studioLinkInput').value;
            store.extVoice = document.getElementById('externalVoiceApi').value;
            sync();
            alert("Đã lưu cài đặt!");
            toggleSettings();
        }
        function openStudio() { window.open(store.studioLink, 'Studio', 'width=900,height=700'); }

        // --- VOICES ---
        function loadVoices() {
            // Lấy tất cả giọng Việt (vi) và Anh (en)
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi') || v.lang.includes('en'));
            document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `
                <option value="${i}">${v.lang.startsWith('vi') ? '🇻🇳' : '🇺🇸'} ${v.name}</option>
            `).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        // --- OFFLINE SYNC ---
        function exportFullData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(store));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `ngao_iu_${currentUser}.json`);
            dl.click();
        }

        function importFullData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    store = JSON.parse(e.target.result);
                    sync();
                    alert("Đã nhập dữ liệu!");
                } catch (err) { alert("Lỗi file!"); }
            };
            reader.readAsText(file);
        }

        // --- CATEGORIES ---
        function renderCategories() {
            let html = `<div onclick="filterBy('All')" class="cat-tag ${currentFilter === 'All' ? 'active' : ''}">Tất cả</div>`;
            store.categories.forEach(cat => {
                html += `<div onclick="filterBy('${cat}')" class="cat-tag ${currentFilter === cat ? 'active' : ''}">${cat}</div>`;
            });
            document.getElementById('categoryTabs').innerHTML = html;
            document.getElementById('newPCat').innerHTML = store.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function addCategory() {
            const n = prompt("Tên danh mục:");
            if(n) { store.categories.push(n); sync(); }
        }

        function filterBy(cat) { currentFilter = cat; renderCategories(); renderList(); }

        // --- PRODUCTS ---
        function processImport() {
            const name = document.getElementById('newPName').value;
            const cat = document.getElementById('newPCat').value;
            let raw = document.getElementById('newPJson').value.trim();
            if(!name || !raw) return;
            try {
                if(!raw.startsWith('[')) raw = '[' + raw + ']';
                const scripts = JSON.parse(raw).map(i => i.script || i.content || (typeof i === 'string' ? i : "")).filter(s => s);
                store.products.push({ id: Date.now(), name, category: cat, img: tempImg || "https://placehold.co/50x50", active: true, scripts });
                sync();
                document.getElementById('newPName').value = ""; document.getElementById('newPJson').value = "";
            } catch(e) { alert("Lỗi JSON!"); }
        }

        function renderList() {
            const list = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            document.getElementById('productList').innerHTML = list.map((p, i) => {
                const gIdx = store.products.findIndex(x => x.id === p.id);
                return `
                <div class="product-card p-4 flex items-center justify-between glass ${p.active ? 'active' : ''}">
                    <div class="flex items-center gap-3 flex-1" onclick="openEdit(${gIdx})">
                        <img src="${p.img}" class="thumb">
                        <div class="text-left">
                            <span class="text-[7px] text-slate-500 uppercase font-bold">${p.category}</span>
                            <div class="font-black text-[11px] uppercase ${p.active ? 'text-red-500' : 'text-slate-500'}">${p.name}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive(${gIdx})" class="w-6 h-6 accent-red-600">
                        <button onclick="deleteProduct(${gIdx})" class="text-slate-800"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- CORE ---
        function sync() {
            localStorage.setItem('ngao_v22_final_' + currentUser, JSON.stringify(store));
            renderCategories(); renderList();
        }
        function toggleActive(i) { store.products[i].active = !store.products[i].active; sync(); }
        function deleteProduct(i) { if(confirm('Xóa?')) { store.products.splice(i, 1); sync(); } }
        function updateUI() {
            document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value;
            document.getElementById('voiceVolVal').innerText = Math.round(document.getElementById('voiceVol').value * 100) + "%";
        }
        function setMode(m) { 
            currentMode = m; 
            document.getElementById('modeOnline').className = m === 'online' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
            document.getElementById('modeOffline').className = m === 'offline' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
        }

        function speak(text, callback) {
            const clean = text.replace(/giá/gi, "cành").replace(/000/g, " ngàn");
            const rate = document.getElementById('voiceRate').value;
            const vol = document.getElementById('voiceVol').value;

            // Nếu có API ngoài thì ưu tiên dùng (Nếu muốn)
            if (store.extVoice && currentMode === 'online') {
                ttsCloud.src = store.extVoice + encodeURIComponent(clean);
                ttsCloud.volume = vol;
                ttsCloud.play().catch(callback);
                ttsCloud.onended = callback;
                return;
            }

            if (currentMode === 'online') {
                ttsCloud.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(clean)}&tl=vi&client=tw-ob&ttsspeed=${rate}`;
                ttsCloud.volume = vol;
                ttsCloud.play().catch(callback);
                ttsCloud.onended = callback;
            } else {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(clean);
                msg.voice = voices[document.getElementById('voiceSelect').value];
                msg.rate = rate; msg.volume = vol;
                msg.onend = callback;
                window.speechSynthesis.speak(msg);
            }
        }

        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                btn.innerText = 'DỪNG'; btn.classList.replace('bg-red-600', 'bg-slate-800');
                worker.postMessage({ action: 'start', interval: document.getElementById('interval').value });
                runNext();
            } else {
                btn.innerText = 'TREO LIVE'; btn.classList.replace('bg-slate-800', 'bg-red-600');
                window.speechSynthesis.cancel();
                worker.postMessage({ action: 'stop' });
            }
        }

        let isSpeaking = false;
        function runNext() {
            if (!isLive || isSpeaking) return;
            const active = store.products.filter(p => p.active);
            if (active.length > 0) {
                isSpeaking = true;
                const p = active[Math.floor(Math.random() * active.length)];
                const s = p.scripts[Math.floor(Math.random() * p.scripts.length)];
                speak(s, () => { isSpeaking = false; });
            }
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { tempImg = e.target.result; document.getElementById('imgStatus').innerText = "OK"; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openEdit(idx) {
            editIdx = idx;
            const p = store.products[idx];
            document.getElementById('editTitle').innerText = p.name;
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s, i) => `
                <textarea class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-[10px] text-white h-20 outline-none">${s}</textarea>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }
        function saveEdit() {
            store.products[editIdx].scripts = Array.from(document.querySelectorAll('#scriptItems textarea')).map(t => t.value);
            sync(); closeEdit();
        }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
