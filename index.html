<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngao IU - v22 Offline Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cat-tag { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #334155; }
        .cat-tag.active { background: #ef4444; border-color: #ef4444; color: white; }
        input[type="range"] { accent-color: #ef4444; cursor: pointer; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6 border-2 border-red-600/20">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white">N</div>
            <h2 class="text-xl font-black uppercase italic">Ngao IU v22 Offline</h2>
            <input type="text" id="user" placeholder="Tên tài khoản..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white text-center">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg">Vào hệ thống</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white">AD</div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase">Admin</h1>
        </div>
        <div class="flex gap-1">
            <button onclick="exportFullData()" class="bg-green-600 px-3 py-2 rounded-xl text-[9px] font-black text-white"><i class="fas fa-download mr-1"></i> XUẤT FILE</button>
            <button onclick="document.getElementById('importFile').click()" class="bg-blue-600 px-3 py-2 rounded-xl text-[9px] font-black text-white"><i class="fas fa-upload mr-1"></i> NHẬP FILE</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importFullData(event)">
        </div>
    </nav>

    <div class="max-w-xl mx-auto p-4 space-y-6">

        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500">Danh mục sản phẩm</span>
                <button onclick="addCategory()" class="text-blue-500 text-[18px]"><i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="categoryTabs" class="flex flex-wrap gap-2">
                </div>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-4 border border-blue-600/20">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white">
                <select id="newPCat" class="bg-slate-950 border border-slate-800 px-4 rounded-2xl text-[10px] text-white outline-none uppercase font-bold">
                    <option value="Chưa phân loại">Danh mục...</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('imgUpload').click()" class="flex-1 bg-slate-800 border border-dashed border-slate-600 rounded-2xl p-3 text-[10px] font-bold">
                    <span id="imgStatus" class="text-slate-400 uppercase">Tải ảnh mẫu</span>
                </button>
                <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this)">
            </div>
            <textarea id="newPJson" placeholder="Dán nội dung JSON kịch bản..." class="w-full h-24 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-[10px] outline-none text-white"></textarea>
            <button onclick="processImport()" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-[11px] uppercase text-white shadow-blue-900/20 shadow-lg">Lưu vào kho hàng</button>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="grid grid-cols-2 gap-2">
                <button id="modeOnline" onclick="setMode('online')" class="bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Online</button>
                <button id="modeOffline" onclick="setMode('offline')" class="bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white">Giọng Offline</button>
            </div>

            <div class="space-y-4 bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Âm lượng</span><span id="voiceVolVal">100%</span></div>
                        <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                </div>
                <div id="offlineConfig" class="pt-2">
                    <select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-xs text-white outline-none"></select>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] text-center shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-4">
                <span class="text-[10px] font-black text-slate-500 uppercase italic">Nghỉ giữa câu (giây)</span>
                <input type="number" id="interval" value="5" class="bg-transparent text-right font-black text-red-500 text-4xl outline-none w-16">
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest text-white">BẮT ĐẦU TREO LIVE</button>
        </div>

        <div id="productList" class="space-y-3 pb-20"></div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6">
        <div class="max-w-xl mx-auto glass p-6 rounded-[2rem] space-y-4 h-full flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <h3 id="editTitle" class="font-black text-sm uppercase text-red-500">SỬA KỊCH BẢN</h3>
                <button onclick="closeEdit()" class="text-white text-xl p-2">×</button>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3 py-2"></div>
            <button onclick="saveEdit()" class="w-full py-4 bg-green-600 rounded-2xl font-black uppercase">LƯU THAY ĐỔI</button>
        </div>
    </div>

    <audio id="ttsCloud" crossOrigin="anonymous"></audio>

    <script>
        // Cấu trúc DB mới: { categories: [], products: [] }
        let store = { categories: ["Thời trang", "Gia dụng"], products: [] };
        let currentUser = "", currentMode = 'offline', tempImg = "", editIdx = null;
        let isLive = false, voices = [], currentFilter = "All";

        const ttsCloud = document.getElementById('ttsCloud');

        // Worker ổn định cho Mobile
        const workerBlob = new Blob([`let t=null;self.onmessage=function(e){if(e.data.action==='start'){clearInterval(t);t=setInterval(()=>{self.postMessage('tick')},e.data.interval*1000)}else if(e.data.action==='stop'){clearInterval(t)}}`], {type:'text/javascript'});
        const worker = new Worker(URL.createObjectURL(workerBlob));
        worker.onmessage = (e) => { if(isLive && e.data === 'tick') runNext(); };

        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return;
            currentUser = user;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('welcomeUser').innerText = user;
            
            const saved = localStorage.getItem('ngao_v22_pro_' + user);
            if (saved) store = JSON.parse(saved);
            
            sync();
            loadVoices();
        }

        // --- QUẢN LÝ DANH MỤC ---
        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            const select = document.getElementById('newPCat');
            
            let html = `<div onclick="filterBy('All')" class="cat-tag ${currentFilter === 'All' ? 'active' : ''}">Tất cả</div>`;
            let selectHtml = `<option value="Chưa phân loại">Danh mục...</option>`;
            
            store.categories.forEach(cat => {
                html += `
                    <div class="relative group">
                        <div onclick="filterBy('${cat}')" class="cat-tag ${currentFilter === cat ? 'active' : ''}">${cat}</div>
                        <button onclick="deleteCategory('${cat}')" class="absolute -top-2 -right-1 text-[10px] bg-slate-800 rounded-full w-4 h-4 text-red-500">×</button>
                    </div>`;
                selectHtml += `<option value="${cat}">${cat}</option>`;
            });
            
            container.innerHTML = html;
            select.innerHTML = selectHtml;
        }

        function addCategory() {
            const name = prompt("Nhập tên danh mục mới:");
            if (name && !store.categories.includes(name)) {
                store.categories.push(name);
                sync();
            }
        }

        function deleteCategory(cat) {
            if (confirm(`Xóa danh mục "${cat}"? Các sản phẩm thuộc mục này sẽ về "Chưa phân loại".`)) {
                store.categories = store.categories.filter(c => c !== cat);
                store.products.forEach(p => { if(p.category === cat) p.category = "Chưa phân loại"; });
                sync();
            }
        }

        function filterBy(cat) {
            currentFilter = cat;
            renderCategories();
            renderList();
        }

        // --- XUẤT NHẬP FILE ---
        function exportFullData() {
            if (store.products.length === 0) return alert("Không có dữ liệu để tải!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(store));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `ngao_iu_v22_${currentUser}.json`);
            dlAnchorElem.click();
        }

        function importFullData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (confirm("Hòa trộn vào danh sách hiện tại? (Hủy sẽ thay thế tất cả)")) {
                        store.categories = [...new Set([...store.categories, ...imported.categories])];
                        store.products = [...store.products, ...imported.products];
                    } else {
                        store = imported;
                    }
                    sync();
                    alert("Đã nhập dữ liệu thành công!");
                } catch (err) { alert("File không hợp lệ!"); }
            };
            reader.readAsText(file);
        }

        // --- XỬ LÝ SẢN PHẨM ---
        function processImport() {
            const name = document.getElementById('newPName').value;
            const category = document.getElementById('newPCat').value;
            let raw = document.getElementById('newPJson').value.trim();
            if(!name || !raw) return alert("Vui lòng điền đủ tên và nội dung!");
            
            try {
                if(!raw.startsWith('[')) raw = '[' + raw + ']';
                const scripts = JSON.parse(raw).map(i => i.script || i.content || i.mo_ta || (typeof i === 'string' ? i : "")).filter(s => s);
                store.products.push({ id: Date.now(), name, category, img: tempImg || "https://placehold.co/50x50", active: true, scripts });
                sync();
                document.getElementById('newPName').value = ""; document.getElementById('newPJson').value = "";
                tempImg = ""; document.getElementById('imgStatus').innerText = "Tải ảnh mẫu";
            } catch(e) { alert("JSON kịch bản bị lỗi cấu trúc!"); }
        }

        function renderList() {
            const list = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            document.getElementById('productList').innerHTML = list.map((p, i) => {
                const globalIdx = store.products.findIndex(sp => sp.id === p.id);
                return `
                <div class="product-card p-4 flex items-center justify-between glass ${p.active ? 'active' : ''}">
                    <div class="flex items-center gap-3 flex-1" onclick="openEdit(${globalIdx})">
                        <img src="${p.img}" class="thumb border border-slate-700">
                        <div class="text-left">
                            <div class="flex gap-2 items-center">
                                <span class="text-[7px] bg-slate-800 text-slate-400 px-1 rounded font-bold">${p.category}</span>
                                <div class="font-black text-[11px] ${p.active ? 'text-red-500' : 'text-slate-500'} uppercase">${p.name}</div>
                            </div>
                            <div class="text-[8px] text-slate-500 font-bold uppercase">${p.scripts.length} câu kịch bản</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive(${globalIdx})" class="w-6 h-6 accent-red-600">
                        <button onclick="deleteProduct(${globalIdx})" class="text-slate-700 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `}).join('');
        }

        // --- CÁC HÀM CƠ BẢN ---
        function sync() {
            localStorage.setItem('ngao_v22_pro_' + currentUser, JSON.stringify(store));
            renderCategories();
            renderList();
        }

        function toggleActive(i) { store.products[i].active = !store.products[i].active; sync(); }
        function deleteProduct(i) { if(confirm('Xóa sản phẩm này?')) { store.products.splice(i, 1); sync(); } }

        function updateUI() {
            document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value;
            document.getElementById('voiceVolVal').innerText = Math.round(document.getElementById('voiceVol').value * 100) + "%";
        }

        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi'));
            document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeOnline').className = mode === 'online' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
            document.getElementById('modeOffline').className = mode === 'offline' ? 'bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white' : 'bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase';
        }

        function speak(text, callback) {
            const cleanText = text.replace(/giá/gi, "cành").replace(/000/g, " ngàn");
            const rate = document.getElementById('voiceRate').value;
            const vol = document.getElementById('voiceVol').value;

            if (currentMode === 'online') {
                ttsCloud.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=vi&client=tw-ob&ttsspeed=${rate}`;
                ttsCloud.volume = vol;
                ttsCloud.play().catch(callback);
                ttsCloud.onended = callback;
            } else {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(cleanText);
                msg.voice = voices[document.getElementById('voiceSelect').value];
                msg.rate = rate; msg.volume = vol;
                msg.onend = callback;
                window.speechSynthesis.speak(msg);
            }
        }

        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                btn.innerText = 'DỪNG TREO'; btn.classList.replace('bg-red-600', 'bg-slate-800');
                worker.postMessage({ action: 'start', interval: document.getElementById('interval').value });
                runNext();
            } else {
                btn.innerText = 'BẮT ĐẦU TREO LIVE'; btn.classList.replace('bg-slate-800', 'bg-red-600');
                window.speechSynthesis.cancel();
                worker.postMessage({ action: 'stop' });
            }
        }

        let isSpeaking = false;
        function runNext() {
            if (!isLive || isSpeaking) return;
            const active = store.products.filter(p => p.active);
            if (active.length > 0) {
                isSpeaking = true;
                const p = active[Math.floor(Math.random() * active.length)];
                const s = p.scripts[Math.floor(Math.random() * p.scripts.length)];
                speak(s, () => { isSpeaking = false; });
            }
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { tempImg = e.target.result; document.getElementById('imgStatus').innerText = "ĐÃ NHẬN ẢNH"; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openEdit(idx) {
            editIdx = idx;
            const p = store.products[idx];
            document.getElementById('editTitle').innerText = p.name;
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s, i) => `
                <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800">
                    <textarea class="w-full bg-transparent text-[11px] outline-none h-20 text-white">${s}</textarea>
                </div>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function saveEdit() {
            const texts = Array.from(document.querySelectorAll('#scriptItems textarea')).map(t => t.value);
            store.products[editIdx].scripts = texts;
            sync(); closeEdit();
        }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
