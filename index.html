<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngao IU - v22 Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cat-tag { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #334155; white-space: nowrap; }
        .cat-tag.active { background: #ef4444; border-color: #ef4444; color: white; }
        .emotion-btn { padding: 6px; border-radius: 10px; font-size: 8px; font-weight: bold; text-transform: uppercase; border: 1px solid #334155; flex: 1; text-align: center; cursor: pointer; transition: 0.2s; color: #94a3b8; min-width: 60px; }
        .emotion-btn.active { background: #ef4444; border-color: #ef4444; color: white; }
        .action-btn { font-size: 10px; padding: 6px 10px; border-radius: 8px; background: #1e293b; color: #94a3b8; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6 shadow-2xl">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white shadow-lg">N</div>
            <h2 class="text-xl font-black uppercase tracking-tighter">Ngao IU v22 Pro</h2>
            <input type="text" id="user" placeholder="Tên tài khoản..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white text-center focus:border-red-600">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg">Vào hệ thống</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-[10px] font-bold text-white uppercase">AD</div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase italic text-red-500 tracking-widest">Admin</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openStudio()" class="bg-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase text-white tracking-widest active:scale-95 transition-transform">Studio App</button>
            <button onclick="toggleSettings()" class="text-slate-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="hidden glass m-4 p-5 rounded-[2rem] space-y-4 border border-blue-500/30">
        <div class="text-[10px] font-bold text-slate-400 uppercase">Xóa danh mục</div>
        <div id="catManageList" class="flex flex-wrap gap-2 py-2"></div>
        <hr class="border-slate-800">
        <div class="space-y-2">
            <label class="text-[9px] font-bold text-slate-500 uppercase">Link Studio Mini-App</label>
            <input type="text" id="studioLinkInput" placeholder="Link Studio App..." class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-blue-400 outline-none">
        </div>
        <div class="space-y-2">
            <label class="text-[9px] font-bold text-slate-500 uppercase">Nhập ID/Link Giọng đọc ngoài</label>
            <input type="text" id="externalVoiceInput" placeholder="Nhập ID giọng hoặc Link API..." class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-orange-400 outline-none">
        </div>
        <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-[10px] uppercase">Lưu cấu hình</button>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-6">
        <div class="flex gap-2">
            <button onclick="exportFullData()" class="flex-1 bg-green-700/30 border border-green-600/50 p-3 rounded-2xl text-[9px] font-black text-green-400 uppercase">Xuất File</button>
            <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-blue-700/30 border border-blue-600/50 p-3 rounded-2xl text-[9px] font-black text-blue-400 uppercase">Nhập File</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importFullData(event)">
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500 italic">Danh mục sản phẩm</span>
                <button onclick="addCategory()" class="text-blue-500"><i class="fas fa-plus-circle text-lg"></i></button>
            </div>
            <div id="categoryTabs" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white">
                <select id="newPCat" class="bg-slate-950 border border-slate-800 px-4 rounded-2xl text-[10px] text-white outline-none font-bold uppercase"></select>
            </div>
            <textarea id="newPJson" placeholder='Dán kịch bản (mỗi dòng 1 câu)...' class="w-full h-24 bg-slate-950 border border-slate-800 p-3 rounded-2xl text-[11px] outline-none text-white leading-relaxed"></textarea>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('imgUpload').click()" class="bg-slate-800 border border-dashed border-slate-600 rounded-2xl p-3 text-[10px] font-bold text-slate-400 uppercase">
                    <span id="imgStatus">Chọn ảnh</span>
                </button>
                <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this)">
                <button onclick="processImport()" class="bg-red-600 rounded-2xl font-black text-[10px] uppercase text-white">Thêm vào kho</button>
            </div>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5">
            <div class="space-y-3">
                <div class="text-[9px] font-black text-slate-500 uppercase text-center">Giọng đọc & Cảm xúc</div>
                <select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-white outline-none font-bold uppercase mb-2"></select>
                
                <div class="flex flex-wrap gap-1">
                    <div onclick="setEmotion('normal')" id="em-normal" class="emotion-btn active">Bình thường</div>
                    <div onclick="setEmotion('cheerful')" id="em-cheerful" class="emotion-btn">Vui vẻ</div>
                    <div onclick="setEmotion('excited')" id="em-excited" class="emotion-btn">Hào hứng</div>
                    <div onclick="setEmotion('sad')" id="em-sad" class="emotion-btn">Trầm lắng</div>
                    <div onclick="setEmotion('whisper')" id="em-whisper" class="emotion-btn">Thì thầm</div>
                    <div onclick="setEmotion('angry')" id="em-angry" class="emotion-btn">Mạnh mẽ</div>
                    <div onclick="setEmotion('friendly')" id="em-friendly" class="emotion-btn">Thân thiện</div>
                    <div onclick="setEmotion('shout')" id="em-shout" class="emotion-btn">Hét to</div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                    <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()" class="w-full accent-red-600">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Nghỉ giữa câu (s)</span><span id="intervalVal">5</span></div>
                    <input type="range" id="interval" min="1" max="30" step="1" value="5" oninput="updateUI()" class="w-full accent-red-600">
                </div>
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl shadow-red-600/20 uppercase text-white">BẮT ĐẦU PHÁT NGẪU NHIÊN</button>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-center px-4">
                <h3 class="text-[10px] font-black text-slate-500 uppercase italic">Kho hàng</h3>
                <button onclick="toggleAllProducts()" class="text-[9px] font-black text-blue-400 border border-blue-400/30 px-3 py-1 rounded-full uppercase active:bg-blue-400 active:text-white">Chọn tất cả</button>
            </div>
            <div id="productList" class="space-y-3 pb-20"></div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6">
        <div class="max-w-xl mx-auto glass p-6 rounded-[3rem] space-y-4 h-full flex flex-col border-2 border-red-600/30">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <h3 id="editTitle" class="font-black text-sm uppercase text-red-500 italic">SỬA KỊCH BẢN</h3>
                <button onclick="closeEdit()" class="text-white text-3xl">&times;</button>
            </div>
            <div class="flex items-center gap-3 bg-slate-900 p-3 rounded-2xl border border-slate-800">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Di chuyển đến:</span>
                <select id="moveCatSelect" onchange="moveProduct(this.value)" class="bg-transparent text-[10px] text-blue-400 font-bold outline-none"></select>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-800">
                <button onclick="addScriptLine()" class="py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase text-white">+ Thêm câu</button>
                <button onclick="saveEdit()" class="py-4 bg-green-600 rounded-2xl font-black text-[10px] uppercase text-white italic">LƯU TẤT CẢ</button>
            </div>
        </div>
    </div>

    <script>
        // Sửa: Thêm trường externalVoice vào store
        let store = { 
    categories: ["Thời trang", "Gia dụng"], 
    products: [], 
    studioLink: "https://aistudio.google.com/u/1/apps/ce2d7b0e-45a7-499f-9b6d-8e33db158288?pli=1&showPreview=true&showAssistant=true", 
    emotion: 'normal', 
    selectedVoice: "" 
};
        let currentUser = "", tempImg = "", editIdx = null, voices = [];
        let isLive = false, currentFilter = "All";
        let nextTimeout = null; // Quản lý thời gian chờ giữa các câu

        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi'));
            const select = document.getElementById('voiceSelect');
            select.innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
            if(store.selectedVoice) select.value = store.selectedVoice;
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return alert("Nhập tên!");
            currentUser = user;
            const saved = localStorage.getItem('ngao_v22_' + user);
            if (saved) store = JSON.parse(saved);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('welcomeUser').innerText = user;
            document.getElementById('studioLinkInput').value = store.studioLink || "";
            document.getElementById('externalVoiceInput').value = store.externalVoice || "";
            loadVoices();
            sync();
        }

        function sync() {
            if(currentUser) localStorage.setItem('ngao_v22_' + currentUser, JSON.stringify(store));
            renderCategories();
            renderList();
            updateUI();
        }

        // Sửa: Logic phát giọng - chờ đọc xong mới tính thời gian nghỉ để đọc câu tiếp theo
        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voiceName = document.getElementById('voiceSelect').value;
            msg.voice = voices.find(v => v.name === voiceName);
            
            let baseRate = parseFloat(document.getElementById('voiceRate').value);
            msg.rate = baseRate;

            // Xử lý cảm xúc mới
            if(store.emotion === 'cheerful') { msg.pitch = 1.2; msg.rate = baseRate * 1.1; }
            else if(store.emotion === 'sad') { msg.pitch = 0.8; msg.rate = baseRate * 0.9; }
            else if(store.emotion === 'excited') { msg.pitch = 1.4; msg.rate = baseRate * 1.2; }
            else if(store.emotion === 'whisper') { msg.pitch = 0.5; msg.rate = baseRate * 0.7; }
            else if(store.emotion === 'angry') { msg.pitch = 0.6; msg.rate = baseRate * 1.3; }
            else if(store.emotion === 'friendly') { msg.pitch = 1.1; msg.rate = baseRate; }
            else if(store.emotion === 'shout') { msg.pitch = 1.8; msg.rate = baseRate * 1.4; }

            msg.onend = () => {
                if(callback) callback();
            };
            
            window.speechSynthesis.speak(msg);
        }

        function runRandom() {
            if(!isLive) return;
            const activeOnes = store.products.filter(p => p.active);
            if(!activeOnes.length) return;

            const p = activeOnes[Math.floor(Math.random() * activeOnes.length)];
            const s = p.scripts[Math.floor(Math.random() * p.scripts.length)];
            
            speak(s, () => {
                // Sau khi đọc xong câu, chờ đúng số giây cài đặt mới đọc câu tiếp
                const delay = parseInt(document.getElementById('interval').value) * 1000;
                nextTimeout = setTimeout(runRandom, delay);
            });
        }

        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                const activeOnes = store.products.filter(p => p.active);
                if(!activeOnes.length) { isLive = false; return alert("Hãy bật ít nhất 1 sản phẩm!"); }
                btn.innerText = "DỪNG PHÁT"; btn.classList.replace('bg-red-600', 'bg-slate-700');
                runRandom();
            } else {
                btn.innerText = "BẮT ĐẦU PHÁT"; btn.classList.replace('bg-slate-700', 'bg-red-600');
                clearTimeout(nextTimeout);
                window.speechSynthesis.cancel();
            }
        }

        // Sửa: Chức năng chọn tất cả
        function toggleAllProducts() {
            const filteredProducts = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            const allActive = filteredProducts.every(p => p.active);
            filteredProducts.forEach(p => p.active = !allActive);
            sync();
        }

        function openStudio() {
    // Ưu tiên lấy link từ ô nhập, nếu ô nhập trống thì lấy link mặc định trong store
    let linkInput = document.getElementById('studioLinkInput');
    let targetLink = (linkInput && linkInput.value.trim() !== "") ? linkInput.value : store.studioLink;

    if (targetLink) {
        window.open(targetLink, '_blank');
    } else {
        alert("Chưa có link Studio!");
    }
}

        function saveSettings() {
            store.studioLink = document.getElementById('studioLinkInput').value.trim();
            store.externalVoice = document.getElementById('externalVoiceInput').value.trim();
            store.selectedVoice = document.getElementById('voiceSelect').value;
            sync();
            alert("Đã lưu cấu hình!");
            toggleSettings();
        }

        // --- CÁC HÀM CŨ GIỮ NGUYÊN ---
        function processImport() {
            const name = document.getElementById('newPName').value.trim();
            const cat = document.getElementById('newPCat').value;
            const raw = document.getElementById('newPJson').value.trim();
            if(!name || !raw) return alert("Thiếu tên hoặc kịch bản!");

            let scripts = [];
            
            // LOGIC SỬA THEO YÊU CẦU
            if(raw.startsWith('[') && raw.endsWith(']')) {
                // Dạng 1: Quét văn bản sau trường "script" trong mảng JSON
                try {
                    const parsed = JSON.parse(raw);
                    scripts = parsed.map(item => (item.script || "").trim()).filter(s => s.length > 0);
                } catch(e) {
                    // Nếu lỗi parse thì coi như văn bản thường
                    scripts = raw.split('\n');
                }
            } else {
                // Dạng 2: Văn bản bình thường tách theo dòng
                scripts = raw.split('\n');
            }

            scripts = scripts.map(s => s.trim()).filter(s => s.length > 2);
            if(!scripts.length) return alert("Không tìm thấy nội dung kịch bản!");

            store.products.unshift({ id: Date.now(), name, category: cat, img: tempImg || "https://placehold.co/100x100?text=NgaoIU", active: true, scripts });
            document.getElementById('newPName').value = "";
            document.getElementById('newPJson').value = "";
            tempImg = ""; document.getElementById('imgStatus').innerText = "Chọn ảnh";
            sync();
        }

        function renderList() {
            const list = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            document.getElementById('productList').innerHTML = list.map((p) => {
                const globalIdx = store.products.indexOf(p);
                return `
                <div class="product-card p-4 glass ${p.active ? 'active' : 'opacity-40'}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4" onclick="toggleActive(${globalIdx})">
                            <img src="${p.img}" class="thumb border-2 border-slate-700">
                            <div>
                                <h4 class="text-[11px] font-black uppercase text-white">${p.name}</h4>
                                <span class="text-[7px] bg-red-600/20 text-red-400 px-2 py-0.5 rounded uppercase font-bold">${p.category}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${globalIdx})" class="action-btn border border-blue-500/50"><i class="fas fa-edit text-blue-400"></i></button>
                            <button onclick="toggleActive(${globalIdx})" class="action-btn ${p.active ? 'bg-red-600 text-white' : 'text-slate-500'}"><i class="fas fa-power-off"></i></button>
                            <button onclick="deleteProduct(${globalIdx})" class="action-btn text-slate-700 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderCategories() {
            let html = `<div onclick="filterBy('All')" class="cat-tag ${currentFilter === 'All' ? 'active' : ''}">Tất cả</div>`;
            store.categories.forEach(cat => { html += `<div onclick="filterBy('${cat}')" class="cat-tag ${currentFilter === cat ? 'active' : ''}">${cat}</div>`; });
            document.getElementById('categoryTabs').innerHTML = html;
            document.getElementById('newPCat').innerHTML = store.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catManageList').innerHTML = store.categories.map(c => `<div class="flex items-center gap-1 bg-slate-800 px-2 py-1 rounded-lg text-[9px] font-bold">${c} <button onclick="deleteCategory('${c}')" class="text-red-500 ml-1">&times;</button></div>`).join('');
        }
        
        function addCategory() { const name = prompt("Tên mục mới:"); if(name) { store.categories.push(name.trim()); sync(); } }
        function deleteCategory(name) { if(confirm(`Xóa mục ${name}?`)) { store.categories = store.categories.filter(c => c !== name); sync(); } }
        function editProduct(idx) { editIdx = idx; const p = store.products[idx]; document.getElementById('editTitle').innerText = "Sửa: " + p.name; document.getElementById('moveCatSelect').innerHTML = store.categories.map(c => `<option value="${c}" ${p.category === c ? 'selected' : ''}>${c}</option>`).join(''); renderEditLines(); document.getElementById('editModal').classList.remove('hidden'); }
        function renderEditLines() {
            const p = store.products[editIdx];
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s, i) => `
                <div class="flex gap-2 items-center bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
                    <textarea onchange="updateScriptLine(${i}, this.value)" class="flex-1 bg-transparent p-2 text-[11px] text-white outline-none h-12 resize-none">${s}</textarea>
                    <button onclick="speak('${s.replace(/'/g, "\\'")}')" class="w-8 h-8 rounded-full bg-blue-600/20 text-blue-400 text-[10px]"><i class="fas fa-play"></i></button>
                    <button onclick="removeScriptLine(${i})" class="w-8 h-8 rounded-full bg-red-600/20 text-red-500 text-[10px]">&times;</button>
                </div>`).join('');
        }
        function moveProduct(cat) { if(editIdx !== null) { store.products[editIdx].category = cat; sync(); } }
        function updateScriptLine(i, val) { store.products[editIdx].scripts[i] = val; }
        function removeScriptLine(i) { store.products[editIdx].scripts.splice(i, 1); renderEditLines(); }
        function addScriptLine() { store.products[editIdx].scripts.push("Câu kịch bản mới..."); renderEditLines(); }
        function saveEdit() { sync(); closeEdit(); }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); window.speechSynthesis.cancel(); }
        function toggleActive(idx) { store.products[idx].active = !store.products[idx].active; sync(); }
        function deleteProduct(idx) { if(confirm("Xóa vĩnh viễn?")) { store.products.splice(idx, 1); sync(); } }
        function filterBy(cat) { currentFilter = cat; sync(); }
        function updateUI() { document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value; document.getElementById('intervalVal').innerText = document.getElementById('interval').value; }
        function previewImg(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = (e) => { tempImg = e.target.result; document.getElementById('imgStatus').innerText = "ĐÃ CHỌN"; }; r.readAsDataURL(input.files[0]); } }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function setEmotion(t) { store.emotion = t; document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active')); document.getElementById('em-'+t).classList.add('active'); }
        function exportFullData() { const blob = new Blob([JSON.stringify(store)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `NgaoIU_Backup.json`; a.click(); }
        function importFullData(e) { const r = new FileReader(); r.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if(d.products) { store = d; sync(); alert("Nhập dữ liệu thành công!"); } } catch(e) { alert("File không hợp lệ!"); } }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
