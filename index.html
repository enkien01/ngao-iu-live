<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngao IU - v22 Smart JSON</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .product-card { transition: 0.3s; border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); border-radius: 1.5rem; }
        .product-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .thumb { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cat-tag { padding: 4px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #334155; }
        .cat-tag.active { background: #ef4444; border-color: #ef4444; color: white; }
    </style>
</head>
<body class="pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] space-y-6">
            <div class="w-16 h-16 bg-red-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-black italic text-white">N</div>
            <h2 class="text-xl font-black uppercase italic">Ngao IU v22</h2>
            <input type="text" id="user" placeholder="Tên tài khoản của bạn..." class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white text-center font-bold">
            <button onclick="handleLogin()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-white shadow-lg">Bắt đầu ngay</button>
        </div>
    </div>

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div id="userAvatar" class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-[11px] font-black text-white uppercase shadow-inner"></div>
            <h1 id="welcomeUser" class="text-[10px] font-black uppercase tracking-widest text-red-500"></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openStudio()" class="bg-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase text-white">Studio</button>
            <button onclick="toggleSettings()" class="text-slate-500 p-2"><i class="fas fa-cog"></i></button>
        </div>
    </nav>

    <div id="settingsPanel" class="hidden glass m-4 p-5 rounded-[2rem] space-y-4 border border-blue-500/30">
        <div class="space-y-2">
            <label class="text-[9px] font-black text-slate-500 uppercase">Link Google Studio App</label>
            <input type="text" id="studioLinkInput" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-[10px] text-blue-400 outline-none">
        </div>
        <button onclick="saveSettings()" class="w-full py-3 bg-blue-600 rounded-xl font-black text-[10px] uppercase">Lưu cấu hình</button>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-6">
        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500">Danh mục</span>
                <button onclick="addCategory()" class="text-blue-500"><i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="categoryTabs" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newPName" placeholder="Tên sản phẩm..." class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-xs outline-none text-white font-bold">
                <select id="newPCat" class="bg-slate-950 border border-slate-800 px-4 rounded-2xl text-[10px] text-white outline-none font-bold uppercase"></select>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="newPImgPreview" class="hidden relative">
                    <img id="tempImgTag" src="" class="w-16 h-16 rounded-xl object-cover border-2 border-red-500">
                    <button onclick="removeTempImg()" class="absolute -top-2 -right-2 bg-red-600 text-white w-5 h-5 rounded-full text-[10px] flex items-center justify-center">×</button>
                </div>
                <div class="flex-1 grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('imgUpload').click()" id="btnUpload" class="bg-slate-800 border border-dashed border-slate-600 rounded-2xl p-3 text-[10px] font-bold text-slate-400 uppercase">
                        <i class="fas fa-image"></i> Ảnh mẫu
                    </button>
                    <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="previewImg(this, 'temp')">
                    <button onclick="processImport()" class="bg-red-600 rounded-2xl font-black text-[10px] uppercase text-white shadow-lg shadow-red-900/40">Lưu sản phẩm</button>
                </div>
            </div>
            <textarea id="newPJson" placeholder="Dán nội dung từ Google Studio vào đây..." class="w-full h-24 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-[10px] outline-none text-white focus:border-red-500"></textarea>
        </div>

        <div class="glass p-6 rounded-[2rem] space-y-5 border border-slate-800/50">
            <div class="grid grid-cols-2 gap-2">
                <button id="modeOnline" onclick="setMode('online')" class="bg-slate-800 p-3 rounded-2xl text-[10px] font-bold uppercase">Giọng Online</button>
                <button id="modeOffline" onclick="setMode('offline')" class="bg-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase text-white">Giọng Offline</button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Tốc độ</span><span id="rateVal">1.0</span></div>
                        <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase"><span>Âm lượng</span><span id="voiceVolVal">100%</span></div>
                        <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1.0" oninput="updateUI()">
                    </div>
                </div>
                <select id="voiceSelect" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-[10px] text-white outline-none font-bold"></select>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] text-center shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-4">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Nghỉ (giây)</span>
                <input type="number" id="interval" value="5" class="bg-transparent text-right font-black text-red-500 text-4xl outline-none w-16">
            </div>
            <button id="btnStart" onclick="toggleLive()" class="w-full py-6 bg-red-600 rounded-[2rem] font-black text-lg shadow-xl uppercase text-white tracking-widest transition-all">TREO LIVE</button>
        </div>

        <div id="productList" class="space-y-3 pb-20"></div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[110] bg-black/95 hidden p-6 overflow-y-auto">
        <div class="max-w-xl mx-auto glass p-6 rounded-[2rem] space-y-4 min-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <img id="editImgPreview" src="" class="w-12 h-12 rounded-xl object-cover border border-slate-700">
                        <button onclick="document.getElementById('editImgUpload').click()" class="absolute -bottom-1 -right-1 bg-blue-600 w-5 h-5 rounded-full text-[8px] flex items-center justify-center"><i class="fas fa-camera"></i></button>
                        <input type="file" id="editImgUpload" class="hidden" accept="image/*" onchange="previewImg(this, 'edit')">
                    </div>
                    <h3 id="editTitle" class="font-black text-sm uppercase text-red-500"></h3>
                </div>
                <button onclick="closeEdit()" class="text-white text-xl">×</button>
            </div>
            <div id="scriptItems" class="flex-1 overflow-y-auto space-y-3"></div>
            <button onclick="saveEdit()" class="w-full py-4 bg-red-600 rounded-2xl font-black uppercase text-[10px]">CẬP NHẬT</button>
        </div>
    </div>

    <audio id="ttsCloud" crossOrigin="anonymous"></audio>

    <script>
        let store = { categories: ["Thời trang", "Phụ kiện"], products: [], studioLink: "[https://ai.studio/apps/ce2d7b0e-45a7-499f-9b6d-8e33db158288](https://ai.studio/apps/ce2d7b0e-45a7-499f-9b6d-8e33db158288)" };
        let currentUser = "", currentMode = 'offline', tempImg = "", editIdx = null;
        let isLive = false, voices = [], currentFilter = "All";

        const ttsCloud = document.getElementById('ttsCloud');
        const workerBlob = new Blob([`let t=null;self.onmessage=function(e){if(e.data.action==='start'){clearInterval(t);t=setInterval(()=>{self.postMessage('tick')},e.data.interval*1000)}else if(e.data.action==='stop'){clearInterval(t)}}`], {type:'text/javascript'});
        const worker = new Worker(URL.createObjectURL(workerBlob));
        worker.onmessage = (e) => { if(isLive && e.data === 'tick') runNext(); };

        function handleLogin() {
            const user = document.getElementById('user').value.trim();
            if (!user) return;
            currentUser = user;
            
            // Cập nhật tên lên Header
            document.getElementById('welcomeUser').innerText = user;
            document.getElementById('userAvatar').innerText = user.substring(0,2);
            
            document.getElementById('loginScreen').classList.add('hidden');
            const saved = localStorage.getItem('ngao_v22_final_' + user);
            if (saved) store = JSON.parse(saved);
            document.getElementById('studioLinkInput').value = store.studioLink || "";
            sync(); loadVoices();
        }

        // --- BỘ LỌC JSON THÔNG MINH ---
        function cleanJSON(str) {
            try {
                // 1. Tìm vị trí mảng JSON đầu tiên [ và cuối cùng ]
                const start = str.indexOf('[');
                const end = str.lastIndexOf(']');
                if (start === -1 || end === -1) throw new Error("Không tìm thấy cấu trúc mảng JSON");
                
                let jsonStr = str.substring(start, end + 1);
                
                // 2. Xử lý các dấu ngoặc kép bên trong nội dung bị AI Studio "làm hỏng"
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error("Lỗi parse JSON:", e);
                return null;
            }
        }

        function processImport() {
            const name = document.getElementById('newPName').value.trim();
            const cat = document.getElementById('newPCat').value;
            let raw = document.getElementById('newPJson').value.trim();

            if(!name || !raw) return alert("Vui lòng nhập tên và dán kịch bản!");

            const data = cleanJSON(raw);
            if(!data) return alert("Định dạng kịch bản không đúng! Hãy đảm bảo copy toàn bộ nội dung từ Google Studio.");

            try {
                const scripts = data.map(i => i.script || i.content || i.text || (typeof i === 'string' ? i : "")).filter(s => s);
                if(scripts.length === 0) return alert("Không tìm thấy câu thoại nào trong kịch bản!");

                store.products.push({ 
                    id: Date.now(), 
                    name, 
                    category: cat, 
                    img: tempImg || "[https://placehold.co/100x100?text=No+Img](https://placehold.co/100x100?text=No+Img)", 
                    active: true, 
                    scripts 
                });
                
                sync();
                document.getElementById('newPName').value = ""; 
                document.getElementById('newPJson').value = "";
                removeTempImg();
                alert("Đã lưu sản phẩm thành công!");
            } catch(e) { alert("Lỗi xử lý dữ liệu!"); }
        }

        // --- CÁC HÀM CÒN LẠI ---
        function previewImg(input, mode) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    if(mode === 'temp') {
                        tempImg = e.target.result;
                        document.getElementById('tempImgTag').src = tempImg;
                        document.getElementById('newPImgPreview').classList.remove('hidden');
                        document.getElementById('btnUpload').classList.add('hidden');
                    } else {
                        document.getElementById('editImgPreview').src = e.target.result;
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeTempImg() {
            tempImg = "";
            document.getElementById('newPImgPreview').classList.add('hidden');
            document.getElementById('btnUpload').classList.remove('hidden');
        }

        function renderList() {
            const list = store.products.filter(p => currentFilter === "All" || p.category === currentFilter);
            document.getElementById('productList').innerHTML = list.map((p) => {
                const gIdx = store.products.findIndex(x => x.id === p.id);
                return `
                <div class="product-card p-4 flex items-center justify-between glass ${p.active ? 'active' : ''}">
                    <div class="flex items-center gap-4 flex-1" onclick="openEdit(${gIdx})">
                        <img src="${p.img}" class="thumb shadow-lg border border-slate-700">
                        <div class="text-left">
                            <span class="text-[7px] text-slate-500 uppercase font-black">${p.category}</span>
                            <div class="font-black text-[11px] uppercase ${p.active ? 'text-red-500' : 'text-slate-500'}">${p.name}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive(${gIdx})" class="w-6 h-6 accent-red-600">
                        <button onclick="deleteProduct(${gIdx})" class="text-slate-700"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        function openEdit(idx) {
            editIdx = idx;
            const p = store.products[idx];
            document.getElementById('editTitle').innerText = p.name;
            document.getElementById('editImgPreview').src = p.img;
            document.getElementById('scriptItems').innerHTML = p.scripts.map((s) => `
                <textarea class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-[11px] text-white h-24 outline-none focus:border-red-500">${s}</textarea>
            `).join('');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function saveEdit() {
            const p = store.products[editIdx];
            p.img = document.getElementById('editImgPreview').src;
            p.scripts = Array.from(document.querySelectorAll('#scriptItems textarea')).map(t => t.value);
            sync(); closeEdit();
        }

        function sync() {
            localStorage.setItem('ngao_v22_final_' + currentUser, JSON.stringify(store));
            renderCategories(); renderList();
        }

        function toggleActive(i) { store.products[i].active = !store.products[i].active; sync(); }
        function deleteProduct(i) { if(confirm('Xóa?')) { store.products.splice(i, 1); sync(); } }
        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveSettings() {
            store.studioLink = document.getElementById('studioLinkInput').value;
            sync(); alert("Đã lưu!"); toggleSettings();
        }
        function openStudio() { window.open(store.studioLink, 'Studio', 'width=1000,height=800'); }
        function loadVoices() {
            voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('vi') || v.lang.includes('en'));
            document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `
                <option value="${i}">${v.lang.startsWith('vi') ? '🇻🇳' : '🇺🇸'} ${v.name}</option>
            `).join('');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        function updateUI() {
            document.getElementById('rateVal').innerText = document.getElementById('voiceRate').value;
            document.getElementById('voiceVolVal').innerText = Math.round(document.getElementById('voiceVol').value * 100) + "%";
        }
        function setMode(m) { currentMode = m; sync(); }

        function speak(text, callback) {
            const clean = text.replace(/giá/gi, "cành").replace(/000/g, " ngàn");
            const rate = document.getElementById('voiceRate').value;
            const vol = document.getElementById('voiceVol').value;
            if (currentMode === 'online') {
                ttsCloud.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(clean)}&tl=vi&client=tw-ob&ttsspeed=${rate}`;
                ttsCloud.volume = vol; ttsCloud.play().catch(callback); ttsCloud.onended = callback;
            } else {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(clean);
                msg.voice = voices[document.getElementById('voiceSelect').value];
                msg.rate = rate; msg.volume = vol; msg.onend = callback;
                window.speechSynthesis.speak(msg);
            }
        }

        function toggleLive() {
            isLive = !isLive;
            const btn = document.getElementById('btnStart');
            if(isLive) {
                btn.innerText = 'DỪNG TREO'; btn.classList.replace('bg-red-600', 'bg-slate-800');
                worker.postMessage({ action: 'start', interval: document.getElementById('interval').value });
                runNext();
            } else {
                btn.innerText = 'TREO LIVE'; btn.classList.replace('bg-slate-800', 'bg-red-600');
                window.speechSynthesis.cancel();
                worker.postMessage({ action: 'stop' });
            }
        }

        let isSpeaking = false;
        function runNext() {
            if (!isLive || isSpeaking) return;
            const active = store.products.filter(p => p.active);
            if (active.length > 0) {
                isSpeaking = true;
                const p = active[Math.floor(Math.random() * active.length)];
                const s = p.scripts[Math.floor(Math.random() * p.scripts.length)];
                speak(s, () => { isSpeaking = false; });
            }
        }

        function renderCategories() {
            let html = `<div onclick="filterBy('All')" class="cat-tag ${currentFilter === 'All' ? 'active' : ''}">Tất cả</div>`;
            store.categories.forEach(cat => {
                html += `<div onclick="filterBy('${cat}')" class="cat-tag ${currentFilter === cat ? 'active' : ''}">${cat}</div>`;
            });
            document.getElementById('categoryTabs').innerHTML = html;
            document.getElementById('newPCat').innerHTML = store.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        function filterBy(cat) { currentFilter = cat; renderCategories(); renderList(); }
        function addCategory() { const n = prompt("Tên danh mục:"); if(n) { store.categories.push(n); sync(); } }
    </script>
</body>
</html>
